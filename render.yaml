services:
  - type: web
    name: forkstack
    runtime: node
    plan: free
    buildCommand: pnpm install && npx prisma generate && npx prisma migrate deploy && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard to Supabase Pooled URL
      - key: DIRECT_URL
        sync: false # Set this in Render Dashboard to Supabase Direct URL
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://forkstack.onrender.com 
